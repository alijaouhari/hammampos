<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HammamPOS Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:white;padding:2rem;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1);width:90%;max-width:400px;text-align:center}
.login-box h1{font-size:1.8rem;margin-bottom:1rem;color:#2563eb}
.login-box input{width:100%;padding:0.75rem;border:2px solid #94a3b8;border-radius:8px;font-size:1rem;margin-bottom:1rem;background:#f8fafc}
.login-box button{width:100%;padding:0.75rem;background:#2563eb;color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}
.header{background:#2563eb;color:white;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.4rem}
.header-btns button{background:rgba(255,255,255,0.2);border:none;color:white;padding:0.5rem 1rem;border-radius:6px;cursor:pointer;margin-right:0.5rem}
.container{max-width:1200px;margin:0 auto;padding:1.5rem}
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.card{background:white;padding:1.5rem;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card h3{color:#64748b;font-size:0.85rem;margin-bottom:0.5rem}
.card .value{font-size:2rem;font-weight:700}
.card .value.green{color:#16a34a}
.locations{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem}
.location-card{background:white;padding:1.5rem;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);cursor:pointer;transition:transform 0.2s}
.location-card:hover{transform:translateY(-2px)}
.location-card h3{font-size:1.2rem;margin-bottom:0.5rem}
.location-card .stat{display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid #f1f5f9}
.back-btn{background:#64748b;color:white;border:none;padding:0.5rem 1rem;border-radius:6px;cursor:pointer;margin-bottom:1rem}
.tickets-table{width:100%;background:white;border-radius:10px;overflow:hidden}
.tickets-table th{background:#f8fafc;padding:0.75rem;text-align:right;font-size:0.85rem;color:#64748b}
.tickets-table td{padding:0.75rem;border-top:1px solid #f1f5f9}
.live-dot{width:8px;height:8px;background:#16a34a;border-radius:50%;display:inline-block;animation:pulse 2s infinite;margin-left:0.5rem}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hidden{display:none!important}
.settings-section{background:white;padding:1.5rem;border-radius:10px;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.settings-section h3{margin-bottom:1rem;color:#2563eb}
.settings-section input{padding:0.5rem;border:2px solid #94a3b8;border-radius:6px;margin-bottom:0.5rem;width:100%;max-width:300px;background:#f8fafc}
.settings-section button{padding:0.5rem 1rem;border:none;border-radius:6px;cursor:pointer;font-weight:600;margin-top:0.5rem}
.btn-blue{background:#2563eb;color:white}
.btn-red{background:#ef4444;color:white}
.loc-item{display:flex;justify-content:space-between;align-items:center;padding:0.75rem;border-bottom:1px solid #f1f5f9}
.msg{padding:0.5rem;border-radius:4px;margin-top:0.5rem;font-size:0.9rem}
.msg-ok{background:#d1fae5;color:#065f46}
.msg-err{background:#fee2e2;color:#991b1b}
</style>
</head>
<body>
<div id="login-view" class="login-container">
<div class="login-box">
<h1>HammamPOS</h1>
<p style="margin-bottom:1.5rem;color:#64748b">لوحة المراقبة</p>
<input type="password" id="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
<p id="login-error" style="color:#ef4444;margin-top:0.5rem;display:none">كلمة المرور غير صحيحة</p>
</div>
</div>
<div id="dashboard-view" class="hidden">
<div class="header">
<h1>HammamPOS <span class="live-dot"></span></h1>
<div class="header-btns">
<button onclick="showSettings()">⚙️ إعدادات</button>
<button onclick="logout()">خروج</button>
</div>
</div>
<div class="container">
<div class="summary-cards" id="summary-cards"></div>
<div id="locations-view">
<h2 style="margin-bottom:1rem">الفروع</h2>
<div class="locations" id="locations-list"></div>
</div>
<div id="detail-view" style="display:none">
<button class="back-btn" onclick="showLocations()">← العودة</button>
<h2 id="detail-title" style="margin-bottom:1rem"></h2>
<div class="summary-cards" id="detail-summary"></div>
<h3 style="margin:1rem 0">تذاكر اليوم</h3>
<table class="tickets-table"><thead><tr><th>#</th><th>الفئة</th><th>السعر</th><th>الوقت</th></tr></thead><tbody id="tickets-body"></tbody></table>
</div>
<div id="settings-view" style="display:none">
<button class="back-btn" onclick="showLocations()">← العودة</button>
<h2 style="margin-bottom:1rem">⚙️ الإعدادات</h2>
<div class="settings-section">
<h3>تغيير كلمة المرور</h3>
<input type="password" id="new-password" placeholder="كلمة المرور الجديدة">
<br><button class="btn-blue" onclick="changePassword()">حفظ</button>
<div id="pw-msg"></div>
</div>
<div class="settings-section">
<h3>إدارة الفروع</h3>
<div id="locations-manage"></div>
</div>
</div>
</div>
</div>
<script>
const SUPABASE_URL='https://ddocgqwzagbwasufnvfi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkb2NncXd6YWdid2FzdWZudmZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NzQxMzksImV4cCI6MjA5ODA1MDEzOX0.5yfqhWGzQuXzT654OuWT6aw50vX23qwoHI4dOJFrkQA';
let PASSWORD=localStorage.getItem('hammampos_pw')||'admin2024';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let locations=[];

function login(){
  if(document.getElementById('password').value===PASSWORD){
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('dashboard-view').classList.remove('hidden');
    loadDashboard();subscribeRealtime();
  }else{document.getElementById('login-error').style.display='block';}
}
function logout(){location.reload();}

async function loadDashboard(){
  const{data:locs}=await sb.from('locations').select('*');
  locations=locs||[];
  const today=new Date().toISOString().split('T')[0];
  const{data:tickets}=await sb.from('tickets').select('*').eq('date',today);
  const all=tickets||[];
  const rev=all.reduce((s,t)=>s+parseFloat(t.price),0);
  document.getElementById('summary-cards').innerHTML=
    '<div class="card"><h3>إجمالي اليوم</h3><div class="value green">'+Math.round(rev)+' DH</div></div>'+
    '<div class="card"><h3>التذاكر</h3><div class="value">'+all.length+'</div></div>'+
    '<div class="card"><h3>الفروع</h3><div class="value">'+locations.length+'</div></div>';
  let html='';
  for(const loc of locations){
    const lt=all.filter(t=>t.location_id===loc.id);
    const lr=lt.reduce((s,t)=>s+parseFloat(t.price),0);
    html+='<div class="location-card" onclick="showDetail(\''+loc.id+'\')"><h3>'+loc.name+'</h3><div class="stat"><span>التذاكر</span><strong>'+lt.length+'</strong></div><div class="stat"><span>الإيرادات</span><strong>'+Math.round(lr)+' DH</strong></div></div>';
  }
  document.getElementById('locations-list').innerHTML=html||'<p style="color:#64748b">لا توجد فروع مسجلة</p>';
}

async function showDetail(id){
  const loc=locations.find(l=>l.id===id);
  document.getElementById('locations-view').classList.add('hidden');
  document.getElementById('settings-view').style.display='none';
  document.getElementById('detail-view').style.display='block';
  document.getElementById('detail-title').textContent=loc.name;
  const today=new Date().toISOString().split('T')[0];
  const{data:tickets}=await sb.from('tickets').select('*').eq('location_id',id).eq('date',today).order('created_at',{ascending:false});
  const tix=tickets||[];
  const rev=tix.reduce((s,t)=>s+parseFloat(t.price),0);
  document.getElementById('detail-summary').innerHTML=
    '<div class="card"><h3>الإيرادات</h3><div class="value green">'+Math.round(rev)+' DH</div></div>'+
    '<div class="card"><h3>التذاكر</h3><div class="value">'+tix.length+'</div></div>';
  let rows='';
  for(const t of tix){rows+='<tr><td>#'+t.serial_number+'/'+t.year+'</td><td>'+t.category_name+'</td><td>'+Math.round(parseFloat(t.price))+' DH</td><td>'+t.time+'</td></tr>';}
  document.getElementById('tickets-body').innerHTML=rows||'<tr><td colspan="4" style="text-align:center;color:#64748b">لا توجد تذاكر</td></tr>';
}

function showLocations(){
  document.getElementById('locations-view').classList.remove('hidden');
  document.getElementById('detail-view').style.display='none';
  document.getElementById('settings-view').style.display='none';
  loadDashboard();
}

async function showSettings(){
  document.getElementById('locations-view').classList.add('hidden');
  document.getElementById('detail-view').style.display='none';
  document.getElementById('settings-view').style.display='block';
  const{data:locs}=await sb.from('locations').select('*');
  let html='';
  for(const loc of locs||[]){html+='<div class="loc-item"><span>'+loc.name+'</span><button class="btn-red" onclick="deleteLocation(\''+loc.id+'\',\''+loc.name+'\')">حذف</button></div>';}
  document.getElementById('locations-manage').innerHTML=html||'<p>لا توجد فروع</p>';
}

function changePassword(){
  const np=document.getElementById('new-password').value;
  if(!np||np.length<4){document.getElementById('pw-msg').innerHTML='<div class="msg msg-err">4 أحرف على الأقل</div>';return;}
  PASSWORD=np;localStorage.setItem('hammampos_pw',np);
  document.getElementById('pw-msg').innerHTML='<div class="msg msg-ok">تم تغيير كلمة المرور</div>';
  document.getElementById('new-password').value='';
}

async function deleteLocation(id,name){
  if(!confirm('حذف فرع "'+name+'"؟ سيتم حذف جميع بياناته!')){return;}
  await sb.from('tickets').delete().eq('location_id',id);
  await sb.from('expenses').delete().eq('location_id',id);
  await sb.from('collections').delete().eq('location_id',id);
  await sb.from('locations').delete().eq('id',id);
  showSettings();
}

function subscribeRealtime(){
  sb.channel('tickets-changes').on('postgres_changes',{event:'INSERT',schema:'public',table:'tickets'},()=>{
    if(document.getElementById('detail-view').style.display!=='none')return;
    loadDashboard();
  }).subscribe();
}

document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
