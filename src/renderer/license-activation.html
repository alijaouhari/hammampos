<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HammamPOS - تفعيل الترخيص</title>
    
    <style>
        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            direction: rtl;
            text-align: right;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .license-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
            overflow: hidden;
        }
        
        .license-header {
            background: #2563eb;
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        .license-header h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
        }
        
        .license-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 1rem;
        }
        
        .license-content {
            padding: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
        }
        
        .form-group input:read-only {
            background: #f9fafb;
            color: #6b7280;
        }
        
        .form-group small {
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: block;
        }
        
        .btn {
            width: 100%;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1d4ed8;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .copy-btn {
            background: #6b7280;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            transition: all 0.2s ease;
        }
        
        .copy-btn:hover {
            background: #4b5563;
        }
        
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        
        .alert.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        
        .alert.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e5e7eb;
            border-radius: 50%;
            border-top-color: #2563eb;
            animation: spin 1s ease-in-out infinite;
            margin-left: 0.5rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .info-box {
            background: #eff6ff;
            border: 1px solid #2563eb;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .info-box h3 {
            margin: 0 0 0.5rem 0;
            color: #1e40af;
            font-size: 1rem;
        }
        
        .info-box p {
            margin: 0;
            color: #1e40af;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="license-container">
        <div class="license-header">
            <h1>🔐 HammamPOS</h1>
            <p>تفعيل الترخيص</p>
        </div>
        
        <div class="license-content">
            <div class="info-box">
                <h3>📋 معلومات مهمة</h3>
                <p>يرجى الحصول على مفتاح الترخيص من مزود الخدمة وإدخاله أدناه لتفعيل البرنامج.</p>
            </div>
            
            <div id="alert-container"></div>
            
            <div class="form-group">
                <label for="machine-id">معرف الجهاز (Machine ID)</label>
                <input type="text" id="machine-id" readonly>
                <button class="copy-btn" id="copy-machine-id">📋 نسخ</button>
                <small>أرسل هذا المعرف إلى مزود الخدمة للحصول على مفتاح الترخيص</small>
            </div>
            
            <div class="form-group">
                <label for="license-key">مفتاح الترخيص *</label>
                <input type="text" id="license-key" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19">
                <small>أدخل مفتاح الترخيص المكون من 16 حرف</small>
            </div>
            
            <button type="button" class="btn btn-primary" id="activate-btn">
                تفعيل الترخيص
            </button>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        
        let machineFingerprint = '';
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadMachineId();
            setupEventListeners();
        });
        
        async function loadMachineId() {
            try {
                const fingerprint = await ipcRenderer.invoke('license:getMachineId');
                machineFingerprint = fingerprint;
                document.getElementById('machine-id').value = fingerprint;
            } catch (error) {
                showAlert('error', 'فشل في تحميل معرف الجهاز: ' + error.message);
            }
        }
        
        function setupEventListeners() {
            document.getElementById('copy-machine-id').addEventListener('click', copyMachineId);
            document.getElementById('activate-btn').addEventListener('click', activateLicense);
            document.getElementById('license-key').addEventListener('input', formatLicenseKey);
        }
        
        function formatLicenseKey(e) {
            let value = e.target.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
            let formatted = '';
            
            for (let i = 0; i < value.length && i < 16; i++) {
                if (i > 0 && i % 4 === 0) {
                    formatted += '-';
                }
                formatted += value[i];
            }
            
            e.target.value = formatted;
        }
        
        function copyMachineId() {
            const machineIdInput = document.getElementById('machine-id');
            machineIdInput.select();
            document.execCommand('copy');
            
            const btn = document.getElementById('copy-machine-id');
            const originalText = btn.textContent;
            btn.textContent = '✅ تم النسخ';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        }
        
        async function activateLicense() {
            const licenseKey = document.getElementById('license-key').value.trim();
            
            if (!licenseKey) {
                showAlert('error', 'يرجى إدخال مفتاح الترخيص');
                return;
            }
            
            if (licenseKey.replace(/-/g, '').length !== 16) {
                showAlert('error', 'مفتاح الترخيص يجب أن يكون 16 حرف');
                return;
            }
            
            const activateBtn = document.getElementById('activate-btn');
            activateBtn.disabled = true;
            activateBtn.innerHTML = '<div class="loading"></div> جاري التفعيل...';
            
            try {
                const result = await ipcRenderer.invoke('license:activate', licenseKey, 'hammampos-core');
                
                if (result.success) {
                    showAlert('success', '✅ تم تفعيل الترخيص بنجاح! جاري فتح البرنامج...');
                    
                    setTimeout(() => {
                        ipcRenderer.send('license:activated');
                    }, 1500);
                } else {
                    showAlert('error', result.error || 'فشل في تفعيل الترخيص');
                    activateBtn.disabled = false;
                    activateBtn.textContent = 'تفعيل الترخيص';
                }
            } catch (error) {
                showAlert('error', 'خطأ في التفعيل: ' + error.message);
                activateBtn.disabled = false;
                activateBtn.textContent = 'تفعيل الترخيص';
            }
        }
        
        function showAlert(type, message) {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert ${type}">${message}</div>`;
        }
    </script>
</body>
</html>
